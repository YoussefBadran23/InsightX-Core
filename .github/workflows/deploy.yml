name: InsightX CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  AWS_REGION: us-east-1

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Lint Backend
        run: |
          black --check backend/ worker/ || echo "Black formatting check failed, but continuing for now."
          flake8 backend/ worker/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Future Phase 4: Frontend tests will go here
      # - name: Install Frontend Deps
      #   run: cd frontend && npm ci

  deploy-aws-ec2:
    needs: test-and-lint
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/InsightX-Core
            git pull origin master
            docker compose -f docker-compose.prod.yml up -d --build
