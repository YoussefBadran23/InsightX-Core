services:
  # ─────────────────────────────────────────────
  # 1. PostgreSQL
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: insightx_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: insightx_user
      POSTGRES_PASSWORD: insightx_pass
      POSTGRES_DB: insightx_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U insightx_user -d insightx_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # 2. Redis
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: insightx_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # 3. FastAPI Backend (hot-reload on port 8000)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightx_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://insightx_user:insightx_pass@db:5432/insightx_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app # mount source for hot-reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─────────────────────────────────────────────
  # 4. Celery Worker (AI Engine Room)
  # ─────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: insightx_worker
    restart: unless-stopped
    env_file:
      - ./worker/.env
    environment:
      DATABASE_URL: postgresql://insightx_user:insightx_pass@db:5432/insightx_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./worker:/app # mount source for easy dev iteration
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A celery_app worker --loglevel=info --concurrency=2

  # ─────────────────────────────────────────────
  # 5. Next.js Frontend (port 3000)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./next-scaffold
      dockerfile: ../frontend/Dockerfile
    container_name: insightx_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./next-scaffold:/app # mount source for hot-reload
      - /app/node_modules # keep container node_modules isolated
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
